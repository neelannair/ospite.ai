<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ospite AI — Welcome Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* Screen preview */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #e8e3dc;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-group label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #5c5650; }
  .ctrl-group input {
    padding: 8px 12px; border: 1px solid #d0c8be; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 13px; background: white;
    outline: none; min-width: 200px;
  }

  .btn {
    padding: 10px 20px; background: #C4714A; color: white; border: none;
    border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; align-self: flex-end;
  }

  /* THE CARD — print size: 3.5" × 5" at 96dpi = 336 × 480px */
  .card-wrap {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    width: 336px;
    background: #FAF7F3;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    position: relative;
  }

  .card-top {
    background: #C4714A;
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }

  .card-top::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .card-top::after {
    content: '';
    position: absolute;
    bottom: -50px; left: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  .card-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
  }

  .card-prop-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: white;
    line-height: 1.1;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .card-location {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    position: relative;
    z-index: 1;
  }

  .card-body {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .card-instruction {
    text-align: center;
    font-size: 13px;
    color: #5c5650;
    line-height: 1.5;
  }

  .card-instruction strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    color: #1E1A16;
    margin-bottom: 4px;
  }

  .qr-frame {
    width: 160px; height: 160px;
    background: white;
    border-radius: 12px;
    border: 1px solid #E8E0D4;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .qr-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(7, 12px);
    grid-template-rows: repeat(7, 12px);
    gap: 2px;
  }

  .qr-cell { background: #1E1A16; border-radius: 2px; }
  .qr-cell.w { background: transparent; }

  .qr-img { width: 140px; height: 140px; }

  .lang-pills {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .lang-pill {
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid #E8E0D4;
    background: white;
    font-size: 10px;
    color: #8C8478;
  }

  .card-divider {
    width: 100%;
    height: 1px;
    background: #E8E0D4;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .card-footer-left {
    font-size: 11px;
    color: #8C8478;
    line-height: 1.4;
  }

  .ospite-badge {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ospite-mark {
    width: 20px; height: 20px;
    background: #C4714A;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }

  .ospite-mark svg { width: 11px; height: 11px; fill: white; }

  .ospite-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 600;
    color: #1E1A16;
  }

  /* Print styles */
  @media print {
    body {
      background: white;
      padding: 0;
      min-height: auto;
      display: block;
    }
    .controls { display: none; }
    .card-wrap { gap: 0; }
    .card {
      box-shadow: none;
      border-radius: 0;
      width: 336px;
      page-break-inside: avoid;
    }
    .print-note { display: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="ctrl-group">
    <label>Property name</label>
    <input id="inp-name" value="Villa Rosaria" oninput="updateCard()">
  </div>
  <div class="ctrl-group">
    <label>Location</label>
    <input id="inp-location" value="Florence, Italy" oninput="updateCard()">
  </div>
  <div class="ctrl-group">
    <label>Guest URL (your Ospite AI link)</label>
    <input id="inp-url" value="https://ospite.ai/villa-rosaria" oninput="updateCard(); generateQR()">
  </div>
  <button class="btn" onclick="window.print()">🖨 Print card</button>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="card-top">
      <div class="card-eyebrow">Welcome to</div>
      <div class="card-prop-name" id="card-name">Villa Rosaria</div>
      <div class="card-location" id="card-location">Florence, Italy</div>
    </div>
    <div class="card-body">
      <div class="card-instruction">
        <strong>Scan for your AI guest assistant</strong>
        Available 24/7 in your language — ask anything about your stay
      </div>

      <div class="qr-frame">
        <img id="qr-img" class="qr-img" alt="QR code" style="display:none">
        <div class="qr-placeholder" id="qr-placeholder">
          <!-- Simple visual QR placeholder -->
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Top-left finder pattern -->
            <rect x="8" y="8" width="28" height="28" rx="3" fill="#1E1A16"/>
            <rect x="13" y="13" width="18" height="18" rx="2" fill="#FAF7F3"/>
            <rect x="17" y="17" width="10" height="10" rx="1" fill="#1E1A16"/>
            <!-- Top-right finder pattern -->
            <rect x="84" y="8" width="28" height="28" rx="3" fill="#1E1A16"/>
            <rect x="89" y="13" width="18" height="18" rx="2" fill="#FAF7F3"/>
            <rect x="93" y="17" width="10" height="10" rx="1" fill="#1E1A16"/>
            <!-- Bottom-left finder pattern -->
            <rect x="8" y="84" width="28" height="28" rx="3" fill="#1E1A16"/>
            <rect x="13" y="89" width="18" height="18" rx="2" fill="#FAF7F3"/>
            <rect x="17" y="93" width="10" height="10" rx="1" fill="#1E1A16"/>
            <!-- Data dots (decorative) -->
            <rect x="44" y="8" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="53" y="8" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="62" y="8" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="44" y="17" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="62" y="17" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="53" y="26" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="8" y="44" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="8" y="53" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="8" y="62" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="17" y="44" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="26" y="53" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="17" y="62" width="6" height="6" rx="1" fill="#1E1A16"/>
            <!-- Center logo area -->
            <rect x="49" y="49" width="22" height="22" rx="4" fill="#C4714A"/>
            <text x="60" y="63" font-family="serif" font-size="12" fill="white" text-anchor="middle">O</text>
            <!-- More data dots -->
            <rect x="106" y="44" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="106" y="53" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="106" y="62" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="97" y="44" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="88" y="53" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="97" y="62" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="44" y="106" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="53" y="106" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="62" y="106" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="44" y="97" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="53" y="88" width="6" height="6" rx="1" fill="#1E1A16"/>
            <rect x="62" y="97" width="6" height="6" rx="1" fill="#1E1A16"/>
          </svg>
        </div>
      </div>

      <div class="lang-pills">
        <span class="lang-pill">🇬🇧 English</span>
        <span class="lang-pill">🇮🇹 Italiano</span>
        <span class="lang-pill">🇪🇸 Español</span>
        <span class="lang-pill">🇫🇷 Français</span>
        <span class="lang-pill">🇩🇪 Deutsch</span>
        <span class="lang-pill">🇵🇹 Português</span>
      </div>

      <div class="card-divider"></div>

      <div class="card-footer">
        <div class="card-footer-left">
          Powered by<br>
          <strong style="color:#1E1A16">AI · Available 24/7</strong>
        </div>
        <div class="ospite-badge">
          <div class="ospite-mark">
            <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8v8l-7 3.88L5 16V8l7-3.82z"/></svg>
          </div>
          <span class="ospite-text">Ospite AI</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function updateCard() {
  document.getElementById('card-name').textContent = document.getElementById('inp-name').value || 'Your Property';
  document.getElementById('card-location').textContent = document.getElementById('inp-location').value || 'Your Location';
}

async function generateQR() {
  const url = document.getElementById('inp-url').value;
  if (!url) return;
  
  // Use a free QR API for preview (in production, use /api/qr endpoint)
  const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(url)}&bgcolor=FAF7F3&color=1E1A16&margin=2`;
  const img = document.getElementById('qr-img');
  const placeholder = document.getElementById('qr-placeholder');
  
  img.onload = () => {
    placeholder.style.display = 'none';
    img.style.display = 'block';
  };
  img.src = apiUrl;
}

// Generate QR on load
generateQR();
</script>
</body>
</html>
